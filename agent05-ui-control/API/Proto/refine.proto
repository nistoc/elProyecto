syntax = "proto3";

option csharp_namespace = "TranslationImprover.Proto";

package translation_improver.refine;

// Paths (input_file_path, output_file_path, prompt_file, intermediate_dir) are relative to the instance's workspace_root (from config).
service RefinerService {
  rpc SubmitRefineJob(SubmitRefineJobRequest) returns (SubmitRefineJobResponse);
  rpc GetRefineStatus(GetRefineStatusRequest) returns (RefineStatusResponse);
  rpc StreamRefineStatus(StreamRefineStatusRequest) returns (stream RefineStatusResponse);
  rpc CancelRefineJob(CancelRefineJobRequest) returns (CancelRefineJobResponse);
  rpc PauseRefineJob(PauseRefineJobRequest) returns (PauseRefineJobResponse);
  rpc ResumeRefineJob(ResumeRefineJobRequest) returns (ResumeRefineJobResponse);
  /// When the in-memory job is gone (e.g. Agent06 restarted), resume by loading checkpoint.json only — creates a new job id.
  rpc ResumeRefineFromCheckpoint(ResumeRefineFromCheckpointRequest) returns (ResumeRefineFromCheckpointResponse);
  rpc QueryRefineJobs(QueryRefineJobsRequest) returns (QueryRefineJobsResponse);
}

message SubmitRefineJobRequest {
  string input_file_path = 1;
  string input_content = 2;
  string output_file_path = 3;
  int32 batch_size = 4;
  int32 context_lines = 5;
  string model = 6;
  float temperature = 7;
  string prompt_file = 8;
  string openai_base_url = 9;
  string openai_organization = 10;
  bool save_intermediate = 11;
  string intermediate_dir = 12;
  string callback_url = 13;
  repeated string tags = 14;
  string job_directory_relative = 15;
  /// When set, used instead of the server's configured WorkspaceRoot so artifacts land in the caller's job folder (Agent05 Jobs:WorkspacePath).
  string workspace_root_override = 16;
}

message SubmitRefineJobResponse {
  string job_id = 1;
}

message GetRefineStatusRequest {
  string job_id = 1;
}

message StreamRefineStatusRequest {
  string job_id = 1;
}

message RefineStatusResponse {
  string job_id = 1;
  string state = 2;
  int32 progress_percent = 3;
  string current_phase = 4;
  int32 current_batch = 5;
  int32 total_batches = 6;
  string output_file_path = 7;
  string error_message = 8;
  string created_at = 9;
  string started_at = 10;
  string completed_at = 11;
  string updated_at = 12;
  repeated string tags = 13;
  int64 stream_sequence = 14;
  string batch_event_kind = 15;
  int32 batch_event_index_0 = 16;
  string batch_threads_relative_path = 17;
  /// Full text sent to OpenAI for the current batch (system + user messages), for UI debugging.
  string openai_request_preview = 18;
  string batch_before_text = 19;
  string batch_after_text = 20;
  string refiner_log_line = 21;
}

message CancelRefineJobRequest {
  string job_id = 1;
}

message CancelRefineJobResponse {
  bool cancelled = 1;
}

message PauseRefineJobRequest {
  string job_id = 1;
}

message PauseRefineJobResponse {
  bool pause_requested = 1;
}

message ResumeRefineJobRequest {
  string job_id = 1;
}

message ResumeRefineJobResponse {
  bool started = 1;
}

message ResumeRefineFromCheckpointRequest {
  string job_directory_relative = 1;
  string workspace_root_override = 2;
}

message ResumeRefineFromCheckpointResponse {
  string job_id = 1;
}

message QueryRefineJobsRequest {
  string semantic_key = 1;
  string status = 2;
  string from = 3;
  string to = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message QueryRefineJobsResponse {
  repeated RefineStatusResponse jobs = 1;
}
